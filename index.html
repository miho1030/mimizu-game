<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>みみず育成ゲーム</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-[#4B3621] text-stone-200 min-h-screen flex flex-col items-center justify-center p-4">

    <div class="text-center mb-6">
        <h1 class="text-3xl font-bold text-stone-100">みみず育成ゲーム</h1>
        <p class="text-sm opacity-70">リードをつけてお出かけしよう</p>
    </div>

    <div class="w-full max-w-sm bg-[#2D241E] rounded-3xl p-6 border border-white/10 shadow-xl mb-8">
        <div class="flex justify-between text-xs font-bold opacity-60 mb-2">
            <span>HUNGER</span>
            <span id="hunger-text">30%</span>
        </div>
        <div class="h-3 w-full bg-black rounded-full overflow-hidden">
            <div id="hunger-bar" class="h-full bg-pink-400 transition-all duration-300" style="width: 30%"></div>
        </div>
        <p id="message" class="text-center mt-4 font-medium text-pink-100">こんにちは！ぼくはみみずだよ。</p>
    </div>

    <div id="worm-area" class="h-32 flex items-center justify-center mb-8">
        <div id="worm" class="flex items-center -space-x-4">
            <div class="w-14 h-14 rounded-full bg-[#FFB6C1] shadow-lg flex items-center justify-center relative">
                <div class="w-3 h-3 bg-black rounded-full absolute top-4 left-2.5"></div>
                <div class="w-3 h-3 bg-black rounded-full absolute top-4 right-2.5"></div>
            </div>
            <div class="w-14 h-14 rounded-full bg-[#FF99AA] shadow-lg"></div>
            <div class="w-14 h-14 rounded-full bg-[#FF99AA] shadow-lg"></div>
            <div class="w-14 h-14 rounded-full bg-[#FF99AA] shadow-lg"></div>
        </div>
    </div>

    <div class="w-full max-w-sm flex gap-4">
        <button id="feed-btn" class="flex-1 py-4 bg-pink-500 rounded-2xl font-bold text-stone-900 hover:bg-pink-400 transition-colors">餌をあげる</button>
        <button id="walk-btn" class="flex-1 py-4 bg-amber-600 rounded-2xl font-bold text-white hover:bg-amber-500 transition-colors">散歩に行く</button>
    </div>

    <script>
        let hunger = 30;
        const hungerText = document.getElementById('hunger-text');
        const hungerBar = document.getElementById('hunger-bar');
        const message = document.getElementById('message');

        document.getElementById('feed-btn').addEventListener('click', () => {
            hunger = Math.max(hunger - 25, 0);
            hungerText.innerText = Math.round(hunger) + '%';
            hungerBar.style.width = hunger + '%';
            message.innerText = "パクパク！おいしい！";
            setTimeout(() => message.innerText = "お腹いっぱい！しあわせ〜。", 2000);
        });

        setInterval(() => {
            hunger = Math.min(hunger + 2, 100);
            hungerText.innerText = Math.round(hunger) + '%';
            hungerBar.style.width = hunger + '%';
        }, 3000);
    </script>
</body>
</html>
