<script src="https://cdn.tailwindcss.com"></script>
<style>
/* 土の中のアニメーション（散歩中以外） */
@keyframes dirtMoving {
0% { background-position: 0 0; }
100% { background-position: 100px 100px; }
}
.bg-dirt {
background-color: #4B3621;
background-image: radial-gradient(#3d2c1b 10%, transparent 10%);
background-size: 20px 20px;
animation: dirtMoving 5s linear infinite;
}
/* 地上の背景（散歩中） */
.bg-grass {
background-color: #7cfc00; /* 草色 */
background-image:
linear-gradient(135deg, #a5ff5b 25%, transparent 25%),
linear-gradient(225deg, #a5ff5b 25%, transparent 25%);
background-size: 30px 30px;
animation: none;
}
/* みみずのプルプル（餌を食べた時） */
@keyframes bounce {
0%, 100% { transform: scale(var(--worm-scale)) translateY(0); }
50% { transform: scale(var(--worm-scale)) translateY(-10px); }
}
.eating {
animation: bounce 0.3s ease-in-out 2;
}
</style>
</head>
