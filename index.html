<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>みみず散歩シム</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-[#4B3621] text-stone-200">
    <div id="app" class="min-h-screen flex flex-col items-center justify-center p-8">
        <h1 class="text-3xl font-bold mb-8">みみず散歩シム</h1>
        
        <div class="w-full max-w-sm bg-black/40 backdrop-blur-md rounded-3xl p-6 border border-white/10 text-center">
            <div class="flex justify-between text-xs font-bold opacity-60 mb-2">
                <span>HUNGER</span>
                <span id="hunger-text">30%</span>
            </div>
            <div class="h-3 w-full bg-stone-900 rounded-full overflow-hidden border border-stone-800">
                <div id="hunger-bar" class="h-full bg-pink-400" style="width: 30%"></div>
            </div>
            <p id="message" class="font-medium mt-4">こんにちは！ぼくはみみずだよ。</p>
        </div>

        <div class="flex gap-4 w-full max-w-sm mt-8">
            <button id="feed-btn" class="flex-1 py-4 rounded-2xl font-bold bg-pink-400 text-stone-900">餌をあげる</button>
        </div>
    </div>

    <script>
        let hunger = 30;
        const hungerText = document.getElementById('hunger-text');
        const hungerBar = document.getElementById('hunger-bar');
        const messageText = document.getElementById('message');

        document.getElementById('feed-btn').addEventListener('click', () => {
            hunger = Math.max(hunger - 25, 0);
            hungerText.innerText = Math.round(hunger) + '%';
            hungerBar.style.width = hunger + '%';
            messageText.innerText = "パクパク！おいしい！";
            setTimeout(() => {
                if(hunger < 50) messageText.innerText = "お腹いっぱい！しあわせ〜。";
            }, 2000);
        });

        setInterval(() => {
            hunger = Math.min(hunger + 2, 100);
            hungerText.innerText = Math.round(hunger) + '%';
            hungerBar.style.width = hunger + '%';
        }, 2000);
    </script>
</body>
</html>
